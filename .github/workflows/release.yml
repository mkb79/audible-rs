name: Release

# Builds the release binaries and attaches them to a GitHub pre-release.
# Trigger by pushing a tag (`v0.1.0-alpha`, …) or manually via the Actions
# tab (workflow_dispatch, giving the tag to build).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v0.1.0-alpha)'
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BIN: audible

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: static musl binaries (no glibc dependency — run anywhere).
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            musl: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04-arm
            musl: true
          # macOS: native per arch (Intel + Apple Silicon M1–M5).
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # musl needs a C toolchain (bundled SQLite) + cmake (aws-lc-sys builds
      # from source for musl — no prebuilt bindings). musl-gcc is used ONLY as
      # the C compiler (CC_*); the Rust linker stays the default self-contained
      # rust-lld, which produces a proper static-pie. Overriding the linker to
      # musl-gcc would link the system musl and segfault at runtime (AUD-140).
      - name: Install musl toolchain
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          stage="${BIN}-${version}-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/${BIN}" "$stage/"
          cp LICENSE README.md "$stage/"
          tar czf "${stage}.tar.gz" "$stage"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: '*.tar.gz'
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum *.tar.gz | tee SHA256SUMS

      # Signature verification (minisign) is added later — see AUD-141.
      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
