name: Release

# One-button releases (AUD-145): trigger via the Actions tab
# (workflow_dispatch) with the version to release — with or without the
# leading `v`. The prepare job validates it (SemVer, newer than the latest
# tag), bumps Cargo.toml/Cargo.lock, regenerates CHANGELOG.md for the new
# version, commits everything as `release: vX.Y.Z` on main, and tags exactly
# that commit. The build/publish jobs then run in the SAME workflow run —
# necessary because a tag pushed with GITHUB_TOKEN would not trigger any
# other workflow.
#
# Pushing a `v*` tag by hand still works as a fallback and skips prepare.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, with or without the leading v (e.g. 0.1.1 or v0.1.0-alpha.2)'
        required: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BIN: audible

jobs:
  prepare:
    name: prepare release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      # Releases always cut from main; full history + tags for the version
      # check and the changelog.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Validate the version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          raw="${{ github.event.inputs.version }}"
          version="${raw#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::'${raw}' is not a SemVer version (expected X.Y.Z or X.Y.Z-prerelease)"
            exit 1
          fi
          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "::error::tag ${tag} already exists"
            exit 1
          fi
          # Newest existing version in SemVer order — via the semver
          # reference implementation (sort -V would mis-order prereleases).
          last="$(git tag -l 'v[0-9]*' | sed 's/^v//' | xargs -r npx --yes semver@7 | tail -n 1)"
          if [ -n "$last" ] && ! npx --yes semver@7 "$version" -r ">${last}" >/dev/null; then
            echo "::error::${version} is not newer than the latest release ${last} (SemVer: a prerelease sorts BEFORE its release, and prerelease identifiers compare numerically only when dot-separated — use alpha.2, not a2)"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      # Keep Cargo.lock in sync — the release builds use --locked.
      - name: Bump the version in Cargo.toml and Cargo.lock
        shell: bash
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          awk -v v="$v" 'BEGIN{done=0} !done && /^version = / {print "version = \"" v "\""; done=1; next} {print}' \
            Cargo.toml > Cargo.toml.new && mv Cargo.toml.new Cargo.toml
          awk -v v="$v" '/^name = "audible-rs"$/{f=1} f && /^version = /{print "version = \"" v "\""; f=0; next} {print}' \
            Cargo.lock > Cargo.lock.new && mv Cargo.lock.new Cargo.lock
          grep -q "^version = \"$v\"$" Cargo.toml
          grep -A1 '^name = "audible-rs"$' Cargo.lock | grep -q "version = \"$v\""

      # --tag renders the upcoming section as [X.Y.Z] instead of [Unreleased]
      # (the tag itself is created two steps below).
      - name: Regenerate CHANGELOG.md
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --tag ${{ steps.ver.outputs.tag }}
        env:
          OUTPUT: CHANGELOG.md

      # `release: vX.Y.Z` is filtered out of the changelog (cliff.toml); the
      # tag points at exactly this commit. --atomic: main and the tag land
      # together or not at all (a concurrent push to main fails the job
      # cleanly instead of tagging a half-done state).
      - name: Commit and tag the release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "release: ${tag}"
          git tag "$tag"
          git push --atomic origin main "refs/tags/${tag}"

  build:
    name: build ${{ matrix.target }}
    # Tag push: prepare is skipped, build the pushed tag. Dispatch: build the
    # tag that prepare just created (always() lets us run after a skip).
    needs: prepare
    if: always() && (github.event_name == 'push' || needs.prepare.result == 'success')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: static musl binaries (no glibc dependency — run anywhere).
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
            musl: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04-arm
            musl: true
          # macOS: Apple Silicon builds natively; the Intel target is
          # cross-compiled on the same arm64 runner because GitHub retired
          # the free x86_64 macOS runners (x86_64-apple-darwin is Tier 2
          # with host tools since Rust 1.90 — still distributed via rustup).
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag || github.ref }}

      # musl needs a C toolchain (bundled SQLite) + cmake (aws-lc-sys builds
      # from source for musl — no prebuilt bindings). musl-gcc is used ONLY as
      # the C compiler (CC_*); the Rust linker stays the default self-contained
      # rust-lld, which produces a proper static-pie. Overriding the linker to
      # musl-gcc would link the system musl and segfault at runtime (AUD-140).
      - name: Install musl toolchain
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools cmake

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
          # Marks this as a release build, so the binary reports a bare
          # version instead of appending its commit (AUD-180, see build.rs).
          # It must come from here: the checkout above is shallow and without
          # tags, so build.rs could not tell a release from a source build on
          # its own — every release binary would carry a commit suffix.
          # build.rs fails the build if this disagrees with Cargo.toml.
          AUDIBLE_RELEASE_TAG: ${{ needs.prepare.outputs.tag || github.ref_name }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag || github.ref_name }}"
          version="${tag#v}"
          stage="${BIN}-${version}-${{ matrix.target }}"
          mkdir "$stage"
          cp "target/${{ matrix.target }}/release/${BIN}" "$stage/"
          cp LICENSE README.md "$stage/"
          tar czf "${stage}.tar.gz" "$stage"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: '*.tar.gz'
          if-no-files-found: error

  release:
    name: publish release
    # prepare is in needs only to expose its tag output; on a tag push it is
    # skipped, so gate on build alone.
    needs: [prepare, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Full history: git-cliff derives the release notes from the commits
      # and tags (AUD-145).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum *.tar.gz | tee SHA256SUMS

      - name: Determine release type
        id: rel
        shell: bash
        run: |
          tag="${{ needs.prepare.outputs.tag || github.ref_name }}"
          # SemVer marks a pre-release with a hyphen suffix (v1.2.3-alpha,
          # -beta, -rc.1, …); a bare vX.Y.Z is a full release.
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Release body = the tag's section from the generated changelog, so the
      # GitHub release and CHANGELOG.md always say the same thing (AUD-145).
      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      # Signature verification (minisign) is added later — see AUD-141.
      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag || github.ref_name }}
          prerelease: ${{ steps.rel.outputs.prerelease }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

  # Homebrew tap (AUD-181): rewrite the formula in mkb79/homebrew-tap so
  # `brew upgrade` follows releases without anyone remembering to bump it.
  #
  # The bump lands as a pull request with auto-merge, never as a direct push:
  # the formula is generated, so nobody reads it before it ships — the tap's CI
  # (install + test + audit, on macOS and Linux) is what reads it. A direct
  # push would make a broken formula live for every `brew install` until CI
  # caught up afterwards.
  tap:
    name: bump homebrew tap
    needs: [prepare, release]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Decide whether this release belongs in the tap
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag || github.ref_name }}"
          echo "tag=$tag"        >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

          # Homebrew serves the version people get by default, so a
          # pre-release must not overwrite a stable formula. While no stable
          # release exists the tap tracks pre-releases (same rule as
          # install.sh and `self check`); once v0.1.0 is out, only stable
          # releases touch the formula.
          if [[ "$tag" == *-* ]]; then
            stable=$(gh release list --repo ${{ github.repository }} \
              --exclude-drafts --exclude-pre-releases --limit 1 --json tagName \
              --jq 'length')
            if [[ "$stable" != "0" ]]; then
              echo "bump=false" >> "$GITHUB_OUTPUT"
              echo "::notice::$tag is a pre-release and a stable release exists — the tap keeps the stable formula"
              exit 0
            fi
          fi
          echo "bump=true" >> "$GITHUB_OUTPUT"

      - name: Render the formula
        if: steps.gate.outputs.bump == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.gate.outputs.tag }}
          VERSION: ${{ steps.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "$TAG" --repo ${{ github.repository }} -p SHA256SUMS -D .

          # The checksums the release itself published — not recomputed here,
          # so the formula can only ever point at the artifacts users get.
          sha() { awk -v f="audible-${VERSION}-$1.tar.gz" '$2 == f { print $1 }' SHA256SUMS; }
          macos_arm=$(sha aarch64-apple-darwin)
          macos_intel=$(sha x86_64-apple-darwin)
          linux_arm=$(sha aarch64-unknown-linux-musl)
          linux_intel=$(sha x86_64-unknown-linux-musl)
          for value in "$macos_arm" "$macos_intel" "$linux_arm" "$linux_intel"; do
            [ -n "$value" ] || { echo "::error::SHA256SUMS is missing an archive for $VERSION"; exit 1; }
          done

          sed -e "s|@VERSION@|${VERSION}|g" \
              -e "s|@SHA_MACOS_ARM@|${macos_arm}|g" \
              -e "s|@SHA_MACOS_INTEL@|${macos_intel}|g" \
              -e "s|@SHA_LINUX_ARM@|${linux_arm}|g" \
              -e "s|@SHA_LINUX_INTEL@|${linux_intel}|g" \
              .github/homebrew/audible-rs.rb.tmpl > audible-rs.rb
          grep -q '@' audible-rs.rb && { echo "::error::unsubstituted placeholder left in the formula"; exit 1; }
          echo "--- rendered formula ---"; cat audible-rs.rb

      - name: Open the bump pull request
        if: steps.gate.outputs.bump == 'true'
        env:
          # Fine-grained PAT, scoped to the tap alone (contents + pull
          # requests). GITHUB_TOKEN cannot write to another repository.
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/mkb79/homebrew-tap.git" tap
          cp audible-rs.rb tap/Formula/audible-rs.rb
          cd tap
          if git diff --quiet; then
            echo "::notice::the formula already describes $VERSION — nothing to bump"
            exit 0
          fi
          git config user.name "mkb79"
          git config user.email "mkb79@hackitall.de"
          branch="bump/audible-rs-${VERSION}"
          git switch -c "$branch"
          git commit -am "audible-rs ${VERSION}"
          git push -u origin "$branch"
          cat > /tmp/pr-body.md <<BODY
          Generated by the audible-rs release workflow from the checksums
          published with [v${VERSION}](https://github.com/mkb79/audible-rs/releases/tag/v${VERSION}).
          Auto-merges once the formula installs, tests and audits cleanly on
          macOS and Linux.
          BODY
          sed -i 's/^          //' /tmp/pr-body.md
          gh pr create --base main --head "$branch" \
            --title "audible-rs ${VERSION}" \
            --body-file /tmp/pr-body.md
          # Lands only when the tap's CI is green — that gate is the point.
          gh pr merge --auto --squash
