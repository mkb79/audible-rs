name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the CI jobs only need to read the checkout (CodeQL
# actions/missing-workflow-permissions, AUD-149).
permissions:
  contents: read

# Rapid successive pushes to a PR branch supersede the running checks —
# cancel them and test only the newest state. Never cancel on main: every
# merge commit gets its full run (a squash merge produces a commit that was
# never tested as-merged, especially with back-to-back merges), and direct
# pushes to main stay fully tested (AUD-150).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
