name: CI

on:
  push:
    branches: [main]
    # Skip CI for changes that cannot affect the build. Only doc-like files —
    # NOT Cargo.toml/Cargo.lock, src, build.rs or the workflows. paths-ignore
    # fires only when *every* changed file matches, so a mixed doc+code push
    # still runs. (If a CI job ever becomes a required status check, revisit:
    # a skipped required check leaves a PR pending forever.)
    paths-ignore: &doc-paths
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore: *doc-paths

# Least privilege: the CI jobs only need to read the checkout (CodeQL
# actions/missing-workflow-permissions, AUD-149).
permissions:
  contents: read

# Rapid successive pushes to a PR branch supersede the running checks —
# cancel them and test only the newest state. Never cancel on main: every
# merge commit gets its full run (a squash merge produces a commit that was
# never tested as-merged, especially with back-to-back merges), and direct
# pushes to main stay fully tested (AUD-150).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # clippy on both platforms: it only lints the code active for the target,
  # so a Linux-only run never sees the `#[cfg(not(unix))]` branches (the
  # Windows agent stubs, the plugin loader's Windows is_executable). rustfmt,
  # by contrast, parses every branch regardless of target, so `fmt` stays
  # Linux-only.
  clippy:
    name: clippy
    strategy:
      fail-fast: false # a Windows failure must not abort the Linux run
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets -- -D warnings

  # test on both platforms: `cargo test` builds every target (so it proves the
  # binary compiles) and runs the suite — the Windows run is the authoritative
  # MSVC build + runtime proof (AUD-188). No separate `cargo build` step: test
  # already compiles the binary.
  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test

  # This repository handles auth material, so the realistic accident is a
  # private key or an auth file, not a provider token — and GitHub's secret
  # scanning only recognizes provider tokens (generic patterns are an
  # organization feature, unavailable here). gitleaks covers exactly that gap,
  # and .gitleaks.toml already allowlists the synthetic test fixtures, so a
  # finding means something.
  #
  # Running it by hand "when in doubt" fails precisely when one feels certain.
  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      # Pinned and checksum-verified: a scanner fetched over the network is
      # itself a supply-chain step. Bump both together.
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The whole history: a secret removed in a later commit is still
          # published — it stays in the objects anyone can fetch.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive" gitleaks

      # --redact: CI logs are public, so a finding must never print the secret
      # it found. The exit code says enough.
      - name: Scan the history
        run: ./gitleaks git . --config .gitleaks.toml --redact --verbose
